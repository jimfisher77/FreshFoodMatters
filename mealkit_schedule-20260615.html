    let selectedDayIndex = 0;

    function getIconColorClass(iconName) {
      switch(iconName) {
        case 'fish': return 'text-blue-500';
        case 'beef': return 'text-red-500';
        case 'leaf': return 'text-green-500';
        default: return 'text-orange-500';
      }
    }

    // Handles clicking a day in the sidebar or table
    function handleDayClick(dayIndex) {
      selectedDayIndex = dayIndex;
      renderApp();
    }

    // Handles clicking a specific meal to scroll to it
    function handleMealClick(event, dayIndex, mealType) {
      event.stopPropagation();
      selectedDayIndex = dayIndex;
      renderApp();
      
      // Delay scrolling slightly to allow rendering to complete
      setTimeout(() => {
        const el = document.getElementById(`meal-${mealType.toLowerCase()}`);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, 100);
    }

    function renderTable() {
      const tbody = document.getElementById('overview-tbody');
      tbody.innerHTML = mealPlan.map((dayData, dIndex) => {
        const isSelected = selectedDayIndex === dIndex;
        
        // Generate cells for Breakfast, Lunch, Dinner
        const mealCells = ['Breakfast', 'Lunch', 'Dinner'].map(mealType => {
          const meal = dayData.meals.find(m => m.type === mealType);
          if (!meal) return `<td class="p-2 align-top border-r last:border-r-0 border-slate-50"></td>`;
          
          return `
            <td class="p-2 align-top border-r last:border-r-0 border-slate-50">
              <button
                onclick="handleMealClick(event, ${dIndex}, '${meal.type}')"
                class="w-full text-left p-2.5 rounded-lg hover:bg-white hover:shadow-sm border border-transparent hover:border-slate-200 transition-all group flex flex-col gap-1.5 h-full"
                title="${meal.title}"
              >
                <div class="flex items-start gap-2">
                  <span class="shrink-0 mt-0.5">
                    <i data-lucide="${meal.icon}" class="w-3.5 h-3.5 ${getIconColorClass(meal.icon)}"></i>
                  </span>
                  <span class="text-sm font-medium text-slate-700 group-hover:text-green-700 transition-colors">
                    ${meal.title}
                  </span>
                </div>
              </button>
            </td>
          `;
        }).join('');

        return `
          <tr class="transition-colors hover:bg-slate-50/50 ${isSelected ? 'bg-green-50/30' : ''}">
            <td 
              class="p-4 cursor-pointer align-top border-r border-slate-50"
              onclick="handleDayClick(${dIndex})"
            >
              <div class="font-bold ${isSelected ? 'text-green-800' : 'text-slate-800'}">
                ${dayData.day}
              </div>
              <div class="text-xs text-slate-500 mt-1">${dayData.date}</div>
            </td>
            ${mealCells}
          </tr>
        `;
      }).join('');
    }

    function renderSidebar() {
      const sidebarList = document.getElementById('sidebar-list');
      sidebarList.innerHTML = mealPlan.map((dayData, index) => {
        const isSelected = selectedDayIndex === index;
        return `
          <li>
            <button
              onclick="handleDayClick(${index})"
              class="w-full text-left px-5 py-4 flex items-center justify-between transition-colors ${
                isSelected 
                  ? 'bg-green-50 border-l-4 border-green-500' 
                  : 'hover:bg-slate-50 border-l-4 border-transparent'
              }"
            >
              <div>
                <div class="font-semibold ${isSelected ? 'text-green-800' : 'text-slate-700'}">
                  ${dayData.day}
                </div>
                <div class="text-xs text-slate-400 mt-0.5">${dayData.date}</div>
              </div>
              <i data-lucide="chevron-right" class="w-5 h-5 ${isSelected ? 'text-green-500' : 'text-slate-300'}"></i>
            </button>
          </li>
        `;
      }).join('');
    }

    function renderDetails() {
      const dayData = mealPlan[selectedDayIndex];
      
      document.getElementById('detail-day-title').innerText = `${dayData.day}'s Menu`;
      document.getElementById('detail-date-subtitle').innerText = dayData.date;

      const detailsContainer = document.getElementById('meal-details-container');
      detailsContainer.innerHTML = dayData.meals.map(meal => {
        const tagsHtml = meal.tags.map(tag => `
          <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-slate-100 text-slate-700">
            ${tag}
          </span>
        `).join('');
        
        const ingredientsHtml = meal.ingredients.map(ing => `
          <li class="flex items-start gap-2">
            <div class="w-1.5 h-1.5 rounded-full bg-green-400 mt-2 shrink-0"></div>
            <span>${ing}</span>
          </li>
        `).join('');
        
        const directionsHtml = meal.directions.map((dir, idx) => `
          <li class="flex gap-3">
            <span class="font-bold text-slate-400 shrink-0 w-4">${idx + 1}.</span>
            <span>${dir}</span>
          </li>
        `).join('');

        return `
          <div 
            id="meal-${meal.type.toLowerCase()}" 
            class="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-slate-200 transition-all hover:shadow-md scroll-mt-6"
          >
            <!-- Meal Header -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-5 pb-5 border-b border-slate-100 gap-3">
              <div class="flex items-center gap-3">
                <div class="bg-slate-100 p-2.5 rounded-xl">
                  <i data-lucide="clock" class="w-5 h-5 text-slate-600"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800 uppercase tracking-wider">${meal.type}</h3>
              </div>
              
              <!-- Tags -->
              <div class="flex flex-wrap gap-2">
                ${tagsHtml}
              </div>
            </div>

            <!-- Meal Content -->
            <div class="flex flex-col md:flex-row items-start gap-5">
              <div class="p-4 bg-slate-50 rounded-2xl shrink-0 border border-slate-100 hidden md:block">
                <i data-lucide="${meal.icon}" class="w-8 h-8 ${getIconColorClass(meal.icon)}"></i>
              </div>
              <div class="w-full">
                <h4 class="text-2xl font-bold text-slate-900 mb-2">${meal.title}</h4>
                <p class="text-slate-500 leading-relaxed text-sm md:text-base italic mb-6">
                  ${meal.description}
                </p>
                
                <!-- Recipe Section: Ingredients & Directions -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 pt-6 border-t border-slate-100">
                  
                  <!-- Ingredients -->
                  <div class="md:col-span-1">
                    <h5 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                      <i data-lucide="shopping-basket" class="w-4 h-4 text-green-600"></i>
                      Ingredients
                    </h5>
                    <ul class="space-y-3 text-sm text-slate-700">
                      ${ingredientsHtml}
                    </ul>
                  </div>
                  
                  <!-- Directions -->
                  <div class="md:col-span-2">
                    <h5 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                      <i data-lucide="list-ordered" class="w-4 h-4 text-orange-500"></i>
                      Directions
                    </h5>
                    <ol class="space-y-4 text-sm text-slate-700">
                      ${directionsHtml}
                    </ol>
                  </div>
                </div>

              </div>
            </div>
            
            <!-- Checkbox state for UI immersion -->
            <div class="mt-8 flex justify-end">
              <button class="flex items-center gap-2 text-sm font-medium text-slate-400 hover:text-green-600 transition-colors">
                <i data-lucide="check-circle-2" class="w-5 h-5"></i>
                Mark as Prepared
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderGroceryList() {
      const dayData = mealPlan[selectedDayIndex];
      const groceryListContainer = document.getElementById('daily-grocery-list-container');
      
      // Collect all ingredients for the selected day
      let allIngredients = [];
      dayData.meals.forEach(meal => {
        allIngredients = allIngredients.concat(meal.ingredients);
      });

      // Simple deduplication based on exact string match. A more robust app would parse quantities.
      const uniqueIngredients = [...new Set(allIngredients)].sort();
      
      const ingredientsListHtml = uniqueIngredients.map(ing => `
          <li class="flex items-center gap-3 py-2 border-b border-slate-100 last:border-0">
            <input type="checkbox" class="w-4 h-4 text-green-600 rounded border-slate-300 focus:ring-green-500">
            <span class="text-sm text-slate-700">${ing}</span>
          </li>
      `).join('');

      groceryListContainer.innerHTML = `
        <div class="bg-green-50/50 rounded-2xl p-6 md:p-8 shadow-sm border border-green-100">
          <div class="flex items-center gap-3 mb-6">
            <div class="bg-green-100 p-2.5 rounded-xl">
              <i data-lucide="shopping-cart" class="w-5 h-5 text-green-700"></i>
            </div>
            <h3 class="text-xl font-bold text-green-900">Daily Grocery List</h3>
          </div>
          <p class="text-sm text-green-700 mb-4">Ingredients needed for all meals on ${dayData.day}:</p>
          <ul class="grid grid-cols-1 md:grid-cols-2 gap-x-8">
            ${ingredientsListHtml}
          </ul>
        </div>
      `;
    }

    function renderApp() {
      renderTable();
      renderSidebar();
      renderDetails();
      renderGroceryList(); // Render the new grocery list component
      // Re-initialize Lucide icons for any newly rendered DOM elements
      lucide.createIcons();
    }

    // Initialize the app on load
    document.addEventListener("DOMContentLoaded", renderApp);

  </script>
</body>
</html>
